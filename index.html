<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OSC Fire Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080d; --panel: #0d1118; --panel2: #121823; --border: #1d2633;
            --text: #d9e7ff; --muted: #71829d; --green: #00ffa3; --blue: #58a6ff;
            --yellow: #ffd86b; --orange: #ff9f43; --red: #ff5577;
            --shadow: 0 0 0 1px rgba(255,255,255,.02), 0 12px 40px rgba(0,0,0,.55);
            --radius: 18px; --glow-blue: 0 0 18px rgba(88,166,255,.25);
            --glow-green: 0 0 18px rgba(0,255,163,.18); --glow-red: 0 0 22px rgba(255,85,119,.3);
            --glow-orange: 0 0 18px rgba(255,159,67,.2); --glass: rgba(255,255,255,.03);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at top,#182235 0%,#06080d 45%), linear-gradient(180deg,#05070b 0%,#0a1018 100%);
            color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 24px; overflow-x: hidden;
        }
        .container { width: 100%; max-width: 1080px; }
        .card {
            position: relative;
            background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
            backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,.06);
            border-radius: 28px; overflow: hidden;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.04); min-height: 660px;
        }
        .card::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(130deg, transparent 0%, rgba(88,166,255,.03) 30%, transparent 60%);
            pointer-events: none;
        }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 28px; border-bottom: 1px solid rgba(255,255,255,.05);
            background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
        }
        .topbar h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
        .topbar p { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .content-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px; padding: 28px; }
        @media (max-width: 850px) { .content-layout { grid-template-columns: 1fr; } }
        .section-title { font-size: 11px; letter-spacing: 2px; font-weight: 800; color: #7cb8ff; margin-bottom: 12px; text-transform: uppercase; }
        .input-block { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .coord-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .field-wrapper { display: flex; flex-direction: column; }
        .field-wrapper label { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%; height: 48px; background: var(--panel2); border: 1px solid rgba(255,255,255,.05);
            border-radius: 12px; color: var(--yellow); font-family: 'JetBrains Mono', monospace;
            font-size: 15px; font-weight: 700; text-align: center; outline: none; transition: all 0.2s;
        }
        input:focus { border-color: rgba(88,166,255,.55); box-shadow: 0 0 0 4px rgba(88,166,255,.10), var(--glow-blue); }
        .control-row { display: flex; gap: 14px; margin-top: 10px; }
        .stack-btn { height: 52px; border: none; border-radius: 14px; font-weight: 800; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .btn-run { flex: 2; background: linear-gradient(180deg, rgba(88,166,255,.18), rgba(88,166,255,.08)); border: 1px solid rgba(88,166,255,0.15); color: #9dc6ff; }
        .btn-run:hover { background: linear-gradient(180deg, rgba(88,166,255,.26), rgba(88,166,255,.12)); box-shadow: var(--glow-blue); }
        .btn-clear { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: var(--muted); }
        .btn-clear:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .output-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between; }
        .module-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .module-row:last-of-type { border-bottom: none; }
        .module-meta h3 { font-size: 14px; font-weight: 700; color: #fff; }
        .module-meta p { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .module-val { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .val-primary { font-size: 18px; font-weight: 700; color: var(--green); }
        .val-secondary { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
        .summary-box { background: var(--panel2); border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; margin-top: 20px; }
        .summary-box .val-primary { color: var(--yellow); font-size: 22px; }
        .status-msg { color: var(--muted); font-size: 13px; text-align: center; margin: auto 0; line-height: 1.6; }
        .orange-banner {
            background: linear-gradient(180deg, rgba(255,159,67,0.12), rgba(255,159,67,0.03));
            border: 1px solid rgba(255,159,67,0.35); border-radius: 14px; padding: 12px 16px;
            text-align: center; margin-bottom: 20px; box-shadow: var(--glow-orange);
            font-size: 12px; font-weight: 600; color: #ffb56b; font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="topbar"><div><h1>OSC Fire Control</h1></div></div>
        <div class="content-layout">
            <div>
                <div class="section-title">Cannon Origin</div>
                <div class="input-block">
                    <div class="coord-grid">
                        <div class="field-wrapper"><label>Origin X</label><input type="number" id="origin_x" value="0" step="any"></div>
                        <div class="field-wrapper"><label>Origin Y</label><input type="number" id="origin_y" value="0" step="any"></div>
                        <div class="field-wrapper"><label>Origin Z</label><input type="number" id="origin_z" value="0" step="any"></div>
                    </div>
                </div>
                <div class="section-title">Magazine Slot</div>
                <div class="input-block">
                    <div class="field-wrapper"><label>Magazine Slot</label><input type="number" id="magazine" value="0" step="1" style="text-align:left;padding-left:20px;"></div>
                </div>
                <div class="section-title">Target Coordinates</div>
                <div class="input-block">
                    <div class="coord-grid">
                        <div class="field-wrapper"><label>Target X</label><input type="number" id="target_x" value="0" step="any"></div>
                        <div class="field-wrapper"><label>Target Y</label><input type="number" id="target_y" value="0" step="any"></div>
                        <div class="field-wrapper"><label>Target Z</label><input type="number" id="target_z" value="0" step="any"></div>
                    </div>
                </div>
                <div class="control-row">
                    <button class="stack-btn btn-clear" onclick="clearMatrix()">Reset Settings</button>
                    <button class="stack-btn btn-run" onclick="computeVector()">Compute Fire Control</button>
                </div>
            </div>
            <div class="output-panel" id="output-panel">
                <div class="status-msg">System Idle.<br>Input terminal parameters to balance trajectory equations.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const DRAG_FACTOR = 0.9;
    const Y_SCALE_FACTOR = 1.5;

    const _RAW_X_POS = [0.7156950333511444, -0.0220342380770918243, 0.1950739620297376];
    const _RAW_Z_POS = [0.0016752651944794091, -0.02280217282231783, 0.7482835308306431];
    const _RAW_X_NEG = [-0.7500792325914095, -0.023022978757179774, -0.003758850016761861];
    const _RAW_Z_NEG = [-0.1951321380183908, -0.0220376005229343534, -0.7157093500391516];
    const _RAW_Y_ACC = [-0.4675153116167671, 0.4554750278874056, 0.002349320922205703];

    const X_POS = _RAW_X_POS.map(v => v * DRAG_FACTOR);
    const Z_POS = _RAW_Z_POS.map(v => v * DRAG_FACTOR);
    const X_NEG = _RAW_X_NEG.map(v => v * DRAG_FACTOR);
    const Z_NEG = _RAW_Z_NEG.map(v => v * DRAG_FACTOR);
    const Y_ACC = [
        _RAW_Y_ACC[0] * DRAG_FACTOR,
        _RAW_Y_ACC[1] * Y_SCALE_FACTOR,
        _RAW_Y_ACC[2] * DRAG_FACTOR
    ];

    // Interaction only applies when X and Z push in the SAME direction.
    // Opposing quadrants (X+/Z- and X-/Z+) need no correction.
    const Z_REDUCES_X_SAME_DIR_POS = 0.0683;  // X+/Z+
    const Z_REDUCES_X_SAME_DIR_NEG = 0.0104;  // X-/Z-
    const X_REDUCES_Z_PER_TNT = 0.0020;
    const EXTRA_Y_DROP_PER_HZ_TNT = 0.008;

    const Y_TARGET_OFFSET = 145;
    const PAYLOAD_X_OFFSET_BASE = 14;
    const PAYLOAD_Y_OFFSET = 6;
    const PAYLOAD_Z_OFFSET = -1;

    function buildStacks(tnt) { return { s: Math.floor(tnt / 64), rem: tnt % 64 }; }

    function copysign(mag, sign) { return Math.sign(sign) >= 0 ? Math.abs(mag) : -Math.abs(mag); }

    function runEngine(ox, oy, oz, mag, tx, ty, tz) {
        let px = ox - PAYLOAD_X_OFFSET_BASE + mag;
        let pz = oz + PAYLOAD_Z_OFFSET;
        let py = oy + PAYLOAD_Y_OFFSET;
        let adj_ty = ty + Y_TARGET_OFFSET;
        let dx = tx - px, dy = adj_ty - py, dz = tz - pz;

        let x_mod = dx >= 0 ? X_POS : X_NEG;
        let z_mod = dz >= 0 ? Z_POS : Z_NEG;
        let x_name = dx >= 0 ? "X+" : "X-";
        let z_name = dz >= 0 ? "Z+" : "Z-";

        // Interaction only for same-direction quadrants
        let same_dir = (dx >= 0) === (dz >= 0);
        let z_red = 0.0;
        if (same_dir) z_red = dx >= 0 ? Z_REDUCES_X_SAME_DIR_POS : Z_REDUCES_X_SAME_DIR_NEG;

        let a = x_mod[0];
        let b = z_mod[0] - copysign(z_red * DRAG_FACTOR, z_mod[0]);
        let c = x_mod[2] - copysign(X_REDUCES_Z_PER_TNT * DRAG_FACTOR, x_mod[2]);
        let d = z_mod[2];
        let det = a * d - b * c;

        let xt = 0, yt = 0, zt = 0;
        for (let loop = 0; loop < 300; loop++) {
            let rdx = dx - yt * Y_ACC[0];
            let rdz = dz - yt * Y_ACC[2];
            let sx = (rdx * d - b * rdz) / det;
            let sz = (a * rdz - c * rdx) / det;
            let nxt = Math.max(0, Math.ceil(sx));
            let nzt = Math.max(0, Math.ceil(sz));
            let rdy = dy - (nxt * x_mod[1] + nzt * z_mod[1]) + (nxt + nzt) * EXTRA_Y_DROP_PER_HZ_TNT;
            let nyt = rdy > 0 ? Math.max(0, Math.ceil(rdy / Y_ACC[1])) : 0;
            if (nxt === xt && nzt === zt && nyt === yt) break;
            xt = nxt; zt = nzt; yt = nyt;
        }
        return { adj_y: adj_ty, x_name, z_name, xt, yt, zt };
    }

    function computeVector() {
        const ox = parseFloat(document.getElementById('origin_x').value) || 0;
        const oy = parseFloat(document.getElementById('origin_y').value) || 0;
        const oz = parseFloat(document.getElementById('origin_z').value) || 0;
        const tx = parseFloat(document.getElementById('target_x').value) || 0;
        const ty = parseFloat(document.getElementById('target_y').value) || 0;
        const tz = parseFloat(document.getElementById('target_z').value) || 0;
        const mag = parseInt(document.getElementById('magazine').value) || 0;

        const deltaX = tx - ox, deltaZ = tz - oz;
        const horizontalDistance = Math.sqrt(deltaX * deltaX + deltaZ * deltaZ);

        const data = runEngine(ox, oy, oz, mag, tx, ty, tz);
        const x_st = buildStacks(data.xt), y_st = buildStacks(data.yt), z_st = buildStacks(data.zt);
        const total = data.xt + data.yt + data.zt;
        const tot_st = buildStacks(total);

        let warningBanner = '';
        if (horizontalDistance < 100) {
            warningBanner = `<div class="orange-banner"> TARGET TOO CLOSE (${horizontalDistance.toFixed(2)} BLOCKS)</div>`;
        }

        document.getElementById('output-panel').innerHTML = `
            <div>
                ${warningBanner}
                <div class="section-title" style="color:var(--green)">Calculated Vectors</div>
                <div class="module-row">
                    <div class="module-meta"><h3>${data.x_name}</h3><p>Horizontal X Velocity</p></div>
                    <div class="module-val"><span class="val-primary">${data.xt} TNT</span><span class="val-secondary">${x_st.s} stk + ${x_st.rem}</span></div>
                </div>
                <div class="module-row">
                    <div class="module-meta"><h3>Y</h3><p>Vertical Height Correction</p></div>
                    <div class="module-val"><span class="val-primary">${data.yt} TNT</span><span class="val-secondary">${y_st.s} stk + ${y_st.rem}</span></div>
                </div>
                <div class="module-row">
                    <div class="module-meta"><h3>${data.z_name}</h3><p>Horizontal Z Velocity</p></div>
                    <div class="module-val"><span class="val-primary">${data.zt} TNT</span><span class="val-secondary">${z_st.s} stk + ${z_st.rem}</span></div>
                </div>
            </div>
            <div class="summary-box">
                <div class="section-title" style="color:var(--yellow);margin-bottom:6px;">Total Chamber Capacity</div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:13px;color:var(--muted)">Combined Tnt Load</span>
                    <div class="module-val">
                        <span class="val-primary">${total} TNT</span>
                        <span class="val-secondary" style="color:var(--text)">${tot_st.s} Stacks + ${tot_st.rem} charges</span>
                    </div>
                </div>
                <div style="margin-top:14px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;border-top:1px solid rgba(255,255,255,0.03);padding-top:10px;">
                    Adjusted Altitude Vector Target: ${data.adj_y.toFixed(2)} | Target Distance: ${horizontalDistance.toFixed(1)} blocks
                </div>
            </div>`;
    }

    function clearMatrix() {
        ['origin_x','origin_y','origin_z','target_x','target_y','target_z','magazine'].forEach(id => {
            document.getElementById(id).value = 0;
        });
        document.getElementById('output-panel').innerHTML = `<div class="status-msg">System Idle.<br>Input terminal parameters to balance trajectory equations.</div>`;
    }
</script>
</body>
</html>
